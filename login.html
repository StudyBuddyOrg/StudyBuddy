<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Study Buddy</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Leckerli+One&family=Montserrat+Alternates:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <main class="login-container">
        <h1 class="login-title">Login Page</h1>
        
        <div class="login-card">
            <form action="#">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="login-button">Login</button>
            </form>
            <script src="login_script.js"></script>
            <p class="disclaimer">Your Study Buddy profile name will be shared. Submit password please.</p>
        </div>
        <p class="form-footer">Don't have an account? <a href="create_account.html">Create Account Page</a></p>
    </main>
</body>
</html>
