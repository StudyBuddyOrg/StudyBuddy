<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Study Buddy</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Leckerli+One&family=Montserrat+Alternates:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="stripebox">
        <div class="stripes" id="orangestripe"></div>
        <div class="stripeduo">
            <div class="stripes" id="redstripe"></div>
            <div class="stripes" id="redstripe"></div>
        </div>
        <div class="stripes" id="bluestripe"></div>
    </div>
    <main class="login-container">
        <h1 class="login-title">Login Page</h1>
        
        <div class="login-card">
            <form id="login_form" action="#">
                <div class="input-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" required>
                </div>
                
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required>
                </div>
                
                <button type="submit" class="login-button">Login</button>
            </form>
            <div id="message"></div>
            <script type="module" src="login_script.js"></script>
            <p class="disclaimer">Your Study Buddy profile name will be shared. Submit password please.</p>
        </div>
        <p class="form-footer">Don't have an account? <a href="create_account.html">Create Account Page</a></p>
<div class="stripe-sidebar">
    <div class="v-line color-1"></div>
    <div class="v-line color-2"></div>
    <div class="v-line color-3"></div>
    <div class="v-line color-4"></div>
    <div class="v-line color-5"></div>
</div>
    </main>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword }
        from "https://www.gstatic.com/firebasejs/10.13.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyB4sFHwYgWueO2-ZKIvc3lmPfEGeKhVliQ",
            authDomain: "studybuddy-b1e01.firebaseapp.com",
            projectId: "studybuddy-b1e01",
            storageBucket: "studybuddy-b1e01.firebasestorage.app",
            messagingSenderId: "755708087089",
            appId: "1:755708087089:web:fc187b3b121fbbf6063e10"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        const form = document.getElementById("login_form");

        form.addEventListener("submit", async (e) => {
            e.preventDefault();
            const email = document.getElementById("email").value;
            const pass = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "index.html"; // hosted page
            } catch (err) {
                console.log(err.message);
            }
        });
    </script>
</body>
</html>
